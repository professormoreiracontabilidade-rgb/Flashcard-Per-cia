<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards - Perícia Contábil</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(180deg, #eef7ff, #ffffff);
  color: #000;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
}
.app { width: 100%; max-width: 460px; text-align: center; }
.header {
  background: #ffffff;
  border: 3px solid #0b2f5b;
  border-radius: 18px;
  padding: 14px 12px;
  margin-bottom: 14px;
  box-shadow: 0 6px 16px rgba(0,0,0,.12);
}
h1 {
  font-size: 24px;
  margin: 0 0 6px;
  color: #0b2f5b;
  font-weight: 900;
  line-height: 1.2;
}
.sub {
  font-size: 18px;
  font-weight: 900;
  color: #000;
  line-height: 1.35;
}
.progress {
  font-size: 18px;
  font-weight: 900;
  margin: 12px 0;
  color: #000;
}
.bar {
  width: 100%;
  height: 12px;
  background: #d9d9d9;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 12px;
}
.bar-fill {
  height: 100%;
  width: 0%;
  background: #0b2f5b;
  transition: width .3s;
}
.card-area { perspective: 1000px; width: 100%; min-height: 430px; }
.card {
  width: 100%;
  min-height: 430px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .55s;
  cursor: pointer;
}
.card.flipped { transform: rotateY(180deg); }
.face {
  position: absolute;
  width: 100%;
  min-height: 430px;
  backface-visibility: hidden;
  border-radius: 24px;
  padding: 28px 22px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-shadow: 0 8px 22px rgba(0,0,0,.20);
  border: 3px solid #111;
}
.front { background: #ffd6e8; }
.back { background: #cfeeff; transform: rotateY(180deg); }
.emoji { font-size: 42px; margin-bottom: 14px; }
.question {
  font-size: 28px;
  line-height: 1.25;
  font-weight: 900;
  color: #000;
}
.answer {
  font-size: 25px;
  line-height: 1.32;
  font-weight: 900;
  color: #000;
}
.hint {
  margin-top: 18px;
  font-size: 15px;
  font-weight: 900;
  color: #000;
}
.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 18px;
}
button {
  border: none;
  border-radius: 14px;
  padding: 15px 10px;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  background: #0b2f5b;
  color: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,.18);
}
button:active { transform: scale(.98); }
button.secondary { background: #198754; }
button.warn { background: #b00020; }
.footer {
  margin-top: 16px;
  font-size: 14px;
  font-weight: 900;
  color: #333;
}
@media (max-width: 380px) {
  h1 { font-size: 21px; }
  .sub { font-size: 16px; }
  .question { font-size: 25px; }
  .answer { font-size: 22px; }
  .card-area, .card, .face { min-height: 400px; }
  button { font-size: 16px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Curso de Contabilidade Professor Moreira</h1>
    <div class="sub">Perícia Contábil<br>WhatsApp (61) 98532-3574</div>
  </div>
  <div class="progress" id="progress"></div>
  <div class="bar"><div class="bar-fill" id="barFill"></div></div>
  <div class="card-area">
    <div class="card" id="card" onclick="flipCard()">
      <div class="face front">
        <div class="emoji">❓</div>
        <div class="question" id="frontText"></div>
        <div class="hint">Toque no cartão para virar</div>
      </div>
      <div class="face back">
        <div class="emoji">✅</div>
        <div class="answer" id="backText"></div>
        <div class="hint">Toque novamente para voltar</div>
      </div>
    </div>
  </div>
  <div class="buttons">
    <button onclick="event.stopPropagation(); prevCard()">⬅️ Voltar</button>
    <button onclick="event.stopPropagation(); nextCard()">Avançar ➡️</button>
    <button class="secondary" onclick="event.stopPropagation(); flipCard()">🔄 Virar</button>
    <button class="warn" onclick="event.stopPropagation(); restart()">🔁 Reiniciar</button>
  </div>
  <div class="footer">Estude, revise e memorize os pontos mais cobrados.</div>
</div>

  },
  {

    "back": "Perícia tem foco específico em litígio ou questão delimitada. Auditoria analisa demonstrações contábeis como um todo."
  },
  {
    "front": "Perícia trabalha com foco amplo ou específico?",
    "back": "Foco específico."
  },
  {
    "front": "Auditoria trabalha com foco em quê?",
    "back": "Nas demonstrações contábeis como um todo."
  },
  {
    "front": "Resumo: Exame significa?",
    "back": "Pessoas, animais e coisas."
  },
  {

  },
  {

  },
  {

  },

];
let current = Number(localStorage.getItem("flashcard_pericia_current")) || 0;
if (current < 0 || current >= cards.length) current = 0;
const card = document.getElementById("card");
const frontText = document.getElementById("frontText");
const backText = document.getElementById("backText");
const progress = document.getElementById("progress");
const barFill = document.getElementById("barFill");
function renderCard() {
  card.classList.remove("flipped");
  frontText.innerHTML = cards[current].front;
  backText.innerHTML = cards[current].back;
  progress.innerHTML = `Cartão ${current + 1} de ${cards.length}`;
  barFill.style.width = `${((current + 1) / cards.length) * 100}%`;
  localStorage.setItem("flashcard_pericia_current", current);
}
function flipCard() { card.classList.toggle("flipped"); }
function nextCard() {
  if (current < cards.length - 1) {
    current++;
    renderCard();
  } else {
    alert("Parabéns! Você concluiu todos os flashcards de Perícia Contábil.");
  }
}
function prevCard() {
  if (current > 0) {
    current--;
    renderCard();
  }
}
function restart() {
  current = 0;
  localStorage.setItem("flashcard_pericia_current", current);
  renderCard();
}
document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowRight") nextCard();
  if (e.key === "ArrowLeft") prevCard();
  if (e.key === " " || e.key === "Enter") flipCard();
});
renderCard();
</script>
</body>
</html>
